<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href= "estilos/media-query.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet">
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">
                <!-- Imagem de login no CSS -->
            </div>
            <div id="formulario">
                <h1>Login</h1>
                <p>Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder as configurações no seu ambiente.</p>
                <form action="login.php" method="post" autocomplete="on">
                <div class="campo">
                    <span class="material-icons">person</span>
                    <input type="text" id="ilogin" name="login" required placeholder="Digite seu e-mail">
                    <label for="ilogin" autocomplete="email">Login</label>
                </div>
                <div>
                    <span class="material-icons">vpn_key</span>
                    <input type="password" id="isen" name="senha" required placeholder="Digite sua senha" minlength="8" maxlength="20">
                    <label for="isen" autocomplete="current-password">Senha</label>
                </div>
                <input type="submit" value="Entrar">
                <a href="#">Esqueci a senha <span class="material-icons">mail</span></a>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
